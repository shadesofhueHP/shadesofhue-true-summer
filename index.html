<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shades of Hue Client Palette</title>

<style>
:root {
--bg: #f6f0ee;
--card: rgba(255,255,255,0.78);
--text: #3f3436;
--muted: #85767a;
--line: rgba(63,52,54,0.10);
--shadow: 0 14px 40px rgba(79, 57, 61, 0.10);
--radius: 24px;
}

* { box-sizing: border-box; }

html, body {
margin: 0;
font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
background:
radial-gradient(circle at top left, rgba(255,255,255,0.82), transparent 26%),
radial-gradient(circle at bottom right, rgba(230,217,223,0.55), transparent 22%),
linear-gradient(180deg, #faf5f4 0%, #f1e7e8 100%);
color: var(--text);
}

body { padding: 18px; }

.shell { max-width: 1150px; margin: 0 auto; display: grid; gap: 18px; }

.hero {
background: var(--card);
border-radius: 28px;
box-shadow: var(--shadow);
padding: 22px;
}

.brand { font-family: Georgia, serif; font-size: 2.4rem; margin:0; }
.sub { color: var(--muted); margin:4px 0 0 0; }

.layout { display: grid; grid-template-columns: 1fr; gap: 18px; }

.panel { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }

.content { padding: 18px; }

.grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 14px;
}

.group-title {
grid-column: 1 / -1;
font-size: 11px;
letter-spacing: .12em;
text-transform: uppercase;
color: var(--muted);
margin-top: 10px;
}

.tile {
aspect-ratio: 1;
border-radius: 20px;
box-shadow: 0 2px 6px rgba(0,0,0,0.05);
cursor: pointer;
}

.lightbox {
position: fixed;
inset: 0;
display: none;
background: rgba(0,0,0,0.82);
justify-content: center;
align-items: center;
}

.lightbox.show { display: flex; }

.lightbox-card {
width: 80vw;
height: 70vh;
border-radius: 28px;
position: relative;
}

.swipe-hint {
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:12px;
letter-spacing:.12em;
transition:.3s;
}

.swipe-hint.hide { opacity:0; }

@media (max-width:800px){
.grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<div class="shell">
<section class="hero">
<h1 class="brand">Shades of Hue</h1>
<p class="sub">Tap color to view full screen</p>
</section>

<section class="layout">
<main class="panel content">
<h2>Soft Summer</h2>
<div class="grid" id="grid"></div>
</main>
</section>
</div>

<div class="lightbox" id="lightbox">
<div class="lightbox-card" id="card">
<div class="swipe-hint" id="hint">SWIPE</div>
</div>
</div>

<script>

const groups = [

{
title:"Neutrals",
colors:[
"#7F7F81","#9A9E9E","#A59694","#B8AFAD",
"#C8BEB3","#CFC7BE","#B7B4A8","#A7A59D",
"#96948E","#7C7B78","#C9CCD1","#B8BBC1",
"#A7ABB3","#D7D3D6","#C6C1C6","#9FA4AA"
]
},

{
title:"Blues",
colors:[
"#556F97","#7FA5C7","#467CA8","#5C8FBD",
"#587C9B","#6E93B2","#8FA8C3","#A5BBD1",
"#4E6B8F","#88A6C0"
]
},

{
title:"Teals",
colors:[
"#356563","#4C7A6D","#567F86","#5F8F91",
"#7FAEA3","#6F9A8A","#89AD88","#2F6A5F",
"#3F7F75","#5B9C90"
]
},

{
title:"Soft Sage Greens",
colors:[
"#8FA08B","#9AA78F","#7E917E","#93A48E",
"#A7B59E","#7F907A","#8C9F88","#9DAF97"
]
},

{
title:"Mauves & Purples",
colors:[
"#6F5B6E","#575775","#67678A","#7878A0",
"#8A8FB1","#A87895","#B2749E","#5F5164",
"#6E668C","#8787A8"
]
},

{
title:"Roses & Pinks",
colors:[
"#754C62","#9C5569","#B0717F","#C28792",
"#D497A1","#E0AEB4","#C04863","#E14F67",
"#E08D94","#D89198"
]
},

{
title:"Soft Summer Yellows",
colors:[
"#D8D1A8","#CFC89E","#E2DBB4","#C7C19A","#BFB88F"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const card=document.getElementById("card");
const hint=document.getElementById("hint");

let colors=[];
let index=0;
let shown=false;
let startX=0;

groups.forEach(g=>{
const t=document.createElement("div");
t.className="group-title";
t.textContent=g.title;
grid.appendChild(t);

g.colors.forEach(c=>{
colors.push(c);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=c;

tile.onclick=()=>open(colors.length-1);

grid.appendChild(tile);
});
});

function open(i){
index=i;
card.style.background=colors[i];
lightbox.classList.add("show");

if(!shown){
hint.classList.remove("hide");
setTimeout(()=>{
hint.classList.add("hide");
shown=true;
},1500);
}
}

lightbox.onclick=()=>lightbox.classList.remove("show");

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

card.addEventListener("touchend",e=>{
const diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;

hint.classList.add("hide");

if(diff<0)index++;
else index--;

if(index<0)index=colors.length-1;
if(index>=colors.length)index=0;

card.style.background=colors[index];
});

</script>

</body>
</html>
