<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Summer Palette</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
padding-top:2px;
}

.logo{
display:block;
max-width:220px;
width:100%;
height:auto;
margin:0 auto 8px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.header div{
margin-top:4px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#7a6f72;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

/* X BUTTON SEPARATE SO IT NEVER GETS CUT OFF */
.close-btn{
position:absolute;
top:max(18px, env(safe-area-inset-top));
right:max(18px, env(safe-area-inset-right));
z-index:3;
}

/* ARROWS GROUP */
.controls{
position:absolute;
top:max(18px, env(safe-area-inset-top));
right:calc(max(18px, env(safe-area-inset-right)) + 62px);
display:flex;
gap:10px;
z-index:2;
}

.btn{
width:46px;
height:46px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:18px;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.swipe{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
z-index:2;
}

@media (max-width:640px){
.container{
padding:6px 14px 14px;
}

.logo{
max-width:180px;
margin:0 auto 6px;
}

.grid{
gap:12px;
}

.tile{
border-radius:18px;
}

.close-btn{
top:max(16px, env(safe-area-inset-top));
right:max(16px, env(safe-area-inset-right));
}

.controls{
top:max(16px, env(safe-area-inset-top));
right:calc(max(16px, env(safe-area-inset-right)) + 56px);
gap:8px;
}

.btn{
width:42px;
height:42px;
font-size:16px;
}

.swipe{
bottom:16px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Soft Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="btn close-btn">✕</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>
const groups = [

{
title:"COOL GREYS + TAUPES",
colors:[
"#A9A6B1",
"#B2A7AB",
"#8E8587",
"#CBC4C7",
"#AA9D9F",
"#B8AFB1",
"#CFC8CB",
"#D3CCC3",
"#C9C1B6",
"#D8D0C6"
]
},

{
title:"STONE + SOFT NEUTRALS",
colors:[
"#C9C7BC",
"#D1CABF",
"#B7BAB6",
"#9EA4A1",
"#838382",
"#BBB7B2"
]
},

{
title:"SOFT BLUES",
colors:[
"#ABC4D0",
"#9FBBCB",
"#86AFC6",
"#729ABB",
"#6C95B6",
"#5F8FB8",
"#4F84B4",
"#8798B0",
"#7E8FA8",
"#6881A0",
"#AEBBC9"
]
},

{
title:"BLUE GREYS",
colors:[
"#9CA8B7",
"#8795A8",
"#7389A5",
"#5A769D",
"#BFCDD8"
]
},

{
title:"SOFT TEALS + BLUE GREENS",
colors:[
"#A5CAC6",
"#94B9B8",
"#82B1AA",
"#6E9FA5",
"#5E8D93",
"#4F7880"
]
},

{
title:"SOFT SAGES + GREENS",
colors:[
"#A7B59E",
"#9DB890",
"#7CA783",
"#6E9779",
"#4B6C63",
"#556336"
]
},

{
title:"PERIWINKLES",
colors:[
"#AFAFC2",
"#9A9CBD",
"#8897BB",
"#8A8CB0",
"#7381AC",
"#7474A0",
"#B2B3CD"
]
},

{
title:"LAVENDERS + MAUVES",
colors:[
"#B8A2C6",
"#A789B3",
"#9E98BB",
"#8A82A5",
"#A58DB8",
"#B086B1",
"#B183A6"
]
},

{
title:"ROSES + DEEP PINKS",
colors:[
"#A86B76",
"#CA5D7C",
"#D76D87",
"#C97787",
"#C56F82",
"#CF8092",
"#D697A5",
"#D78C9D",
"#C48999",
"#B57383"
]
},

{
title:"BLUSH + LIGHT PINKS",
colors:[
"#E5B4C0",
"#E9BDC7",
"#E7B9C7",
"#EFC7D0",
"#DFA0B3",
"#D7A4AD",
"#E2B4B5"
]
},

{
title:"BERRIES + PLUMS",
colors:[
"#C14E6E",
"#E05D77",
"#C84F63",
"#B93861",
"#AE446E",
"#A24A78",
"#91556A",
"#6B4466"
]
},

{
title:"SOFT SUMMER YELLOWS",
colors:[
"#E1DEA2",
"#D8D39A",
"#D1C98A",
"#E2D4A5",
"#DDD3AA",
"#CFC89E",
"#D6C38B",
"#E6D9B0"
]
}

];

const grid = document.getElementById("grid");
const lightbox = document.getElementById("lightbox");
const lightboxColor = document.getElementById("lightboxColor");

let all = [];
let index = 0;
let startX = 0;

groups.forEach(group => {
  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = group.title;
  grid.appendChild(title);

  group.colors.forEach(color => {
    all.push(color);

    const tile = document.createElement("div");
    tile.className = "tile";
    tile.style.background = color;

    tile.onclick = () => {
      index = all.indexOf(color);
      open();
    };

    grid.appendChild(tile);
  });
});

function open(){
  lightbox.classList.add("show");
  render();
}

function render(){
  lightboxColor.style.background = all[index];
}

function next(){
  index = (index + 1) % all.length;
  render();
}

function prev(){
  index = (index - 1 + all.length) % all.length;
  render();
}

document.getElementById("close").onclick = () => lightbox.classList.remove("show");
document.getElementById("next").onclick = next;
document.getElementById("prev").onclick = prev;

lightbox.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
  let diff = e.changedTouches[0].clientX - startX;
  if(Math.abs(diff) < 40) return;
  diff < 0 ? next() : prev();
});
</script>

</body>
</html>
