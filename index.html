<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shades of Hue Client Palette</title>

<style>
:root {
--card: rgba(255,255,255,0.78);
--text: #3f3436;
--muted: #85767a;
--shadow: 0 14px 40px rgba(79, 57, 61, 0.10);
--radius: 24px;
}

* { box-sizing: border-box; }

html, body {
margin: 0;
font-family: Inter, system-ui, sans-serif;
background:
linear-gradient(180deg, #faf5f4 0%, #f1e7e8 100%);
color: var(--text);
}

body { padding: 14px; }

.shell {
max-width: 900px;
margin: 0 auto;
display: grid;
gap: 16px;
}

.hero {
background: var(--card);
border-radius: 26px;
box-shadow: var(--shadow);
padding: 20px;
text-align:center;
}

.logo {
width:140px;
margin-bottom:8px;
}

.title {
font-family: Georgia, serif;
font-size: 28px;
margin: 0;
}

.sub {
color: var(--muted);
font-size:14px;
}

.panel {
background: var(--card);
border-radius: var(--radius);
box-shadow: var(--shadow);
padding: 16px;
}

.grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px;
}

.group-title {
grid-column: 1 / -1;
font-size: 11px;
letter-spacing: .12em;
text-transform: uppercase;
color: var(--muted);
margin-top: 6px;
}

.tile {
aspect-ratio: 1;
border-radius: 18px;
cursor: pointer;
}

.lightbox {
position: fixed;
inset: 0;
display: none;
background: rgba(0,0,0,0.85);
justify-content: center;
align-items: center;
padding:16px;
}

.lightbox.show { display:flex; }

.lightbox-inner {
width:100%;
max-width:500px;
padding:0 10px;
}

.lightbox-toolbar{
display:flex;
justify-content:flex-end;
gap:10px;
margin-bottom:8px;
}

.nav-btn{
background:rgba(255,255,255,.18);
border:none;
color:white;
padding:10px 12px;
border-radius:999px;
}

.close-btn{
background:rgba(255,255,255,.18);
border:none;
color:white;
padding:10px 14px;
border-radius:999px;
}

.lightbox-card{
height:65vh;
border-radius:24px;
position:relative;
}

.swipe-hint{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:12px;
letter-spacing:.12em;
}

</style>
</head>

<body>

<div class="shell">

<section class="hero">

<img src="YOUR-LOGO.png" class="logo"/>

<h1 class="title">Soft Summer</h1>
<div class="sub">Tap color • Swipe to browse</div>

</section>

<section class="panel">
<div class="grid" id="grid"></div>
</section>

</div>

<div class="lightbox" id="lightbox">
<div class="lightbox-inner">

<div class="lightbox-toolbar">
<button class="nav-btn" id="prev">←</button>
<button class="nav-btn" id="next">→</button>
<button class="close-btn" id="close">✕</button>
</div>

<div class="lightbox-card" id="card">
<div class="swipe-hint">SWIPE</div>
</div>

</div>
</div>

<script>

const groups=[

{
title:"Neutrals",
colors:[
"#7F7F81","#9A9E9E","#A59694","#B8AFAD",
"#C8BEB3","#CFC7BE","#B7B4A8","#A7A59D",
"#96948E","#7C7B78","#C9CCD1","#B8BBC1",
"#A7ABB3","#D7D3D6","#C6C1C6","#9FA4AA"
]
},

{
title:"Blues",
colors:[
"#556F97","#7FA5C7","#467CA8","#5C8FBD",
"#587C9B","#6E93B2","#8FA8C3","#A5BBD1",
"#4E6B8F","#88A6C0"
]
},

{
title:"Teals",
colors:[
"#356563","#4C7A6D","#567F86","#5F8F91",
"#7FAEA3","#6F9A8A","#89AD88","#2F6A5F",
"#3F7F75","#5B9C90"
]
},

{
title:"Soft Sage Greens",
colors:[
"#8FA08B","#9AA78F","#7E917E","#93A48E",
"#A7B59E","#7F907A","#8C9F88","#9DAF97"
]
},

{
title:"Mauves & Purples",
colors:[
"#6F5B6E","#575775","#67678A","#7878A0",
"#8A8FB1","#A87895","#B2749E","#5F5164",
"#6E668C","#8787A8"
]
},

{
title:"Roses & Pinks",
colors:[
"#754C62","#9C5569","#B0717F","#C28792",
"#D497A1","#E0AEB4","#C04863","#E14F67",
"#E08D94","#D89198"
]
},

{
title:"Soft Summer Yellows",
colors:[
"#D8D1A8","#CFC89E","#E2DBB4","#C7C19A","#BFB88F"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const card=document.getElementById("card");

let colors=[];
let index=0;
let startX=0;

groups.forEach(g=>{
const t=document.createElement("div");
t.className="group-title";
t.textContent=g.title;
grid.appendChild(t);

g.colors.forEach(c=>{
colors.push(c);
const tile=document.createElement("div");
tile.className="tile";
tile.style.background=c;
tile.onclick=()=>open(colors.length-1);
grid.appendChild(tile);
});
});

function open(i){
index=i;
card.style.background=colors[i];
lightbox.classList.add("show");
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");

document.getElementById("next").onclick=()=>{
index=(index+1)%colors.length;
card.style.background=colors[index];
};

document.getElementById("prev").onclick=()=>{
index=(index-1+colors.length)%colors.length;
card.style.background=colors[index];
};

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

card.addEventListener("touchend",e=>{
const diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
if(diff<0)index++; else index--;
if(index<0)index=colors.length-1;
if(index>=colors.length)index=0;
card.style.background=colors[index];
});

</script>

</body>
</html>
