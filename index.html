<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Summer Palette</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 8px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#7a6f72;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

/* FIXED CONTROLS POSITION */
.controls{
position:absolute;
top:max(20px, env(safe-area-inset-top));
right:max(20px, env(safe-area-inset-right));
display:flex;
gap:10px;
z-index:2;
}

.btn{
width:46px;
height:46px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:18px;
backdrop-filter:blur(6px);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.swipe{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
z-index:2;
}

@media (max-width:640px){

.controls{
top:max(18px, env(safe-area-inset-top));
right:max(18px, env(safe-area-inset-right));
}

.btn{
width:42px;
height:42px;
font-size:16px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png">
<h1>Soft Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
<button id="close" class="btn">✕</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

/* YOUR EXISTING COLOR GROUPS STAY EXACTLY THE SAME */

const groups = [

{
title:"COOL GREYS + TAUPES",
colors:[
"#A9A6B1","#B2A7AB","#8E8587","#CBC4C7","#AA9D9F",
"#B8AFB1","#CFC8CB","#D3CCC3","#C9C1B6","#D8D0C6"
]
},

{
title:"SOFT SUMMER YELLOWS",
colors:[
"#E1DEA2","#D8D39A","#D1C98A","#E2D4A5",
"#DDD3AA","#CFC89E","#D6C38B","#E6D9B0"
]
},

{
title:"SOFT BLUES",
colors:[
"#ABC4D0","#9FBBCB","#86AFC6","#729ABB",
"#6C95B6","#5F8FB8","#4F84B4","#8798B0",
"#7E8FA8","#6881A0","#AEBBC9"
]
},

{
title:"PERIWINKLES",
colors:[
"#AFAFC2","#9A9CBD","#8897BB",
"#8A8CB0","#7381AC","#7474A0","#B2B3CD"
]
},

{
title:"ROSES + PINKS",
colors:[
"#A86B76","#CA5D7C","#D76D87","#C97787",
"#C56F82","#CF8092","#D697A5","#D78C9D",
"#C48999","#B57383"
]
}

];

const grid=document.getElementById("grid")
const lightbox=document.getElementById("lightbox")
const lightboxColor=document.getElementById("lightboxColor")

let all=[]
let index=0
let startX=0

groups.forEach(group=>{

const title=document.createElement("div")
title.className="section-title"
title.textContent=group.title
grid.appendChild(title)

group.colors.forEach(color=>{

all.push(color)

const tile=document.createElement("div")
tile.className="tile"
tile.style.background=color

tile.onclick=()=>{
index=all.indexOf(color)
open()
}

grid.appendChild(tile)

})

})

function open(){
lightbox.classList.add("show")
render()
}

function render(){
lightboxColor.style.background=all[index]
}

function next(){
index=(index+1)%all.length
render()
}

function prev(){
index=(index-1+all.length)%all.length
render()
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show")
document.getElementById("next").onclick=next
document.getElementById("prev").onclick=prev

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX
if(Math.abs(diff)<40)return
diff<0?next():prev()
})

</script>

</body>
</html>
