<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Summer Palette</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
text-align:center;
margin-bottom:10px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#7a6f72;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.controls{
position:absolute;
top:14px;
right:14px;
display:flex;
gap:10px;
}

.btn{
width:46px;
height:46px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:18px;
backdrop-filter:blur(6px);
}

.swipe{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Soft Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
<button id="close" class="btn">✕</button>
</div>

<div id="swipe" class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"COOL GREYS + TAUPES",
colors:[
"#7F7F81","#9A9E9E","#A59694",
"#B8AFAD","#C8BEB3","#CFC7BE",
"#B7B4A8","#A7A59D","#96948E"
]
},

{
title:"SOFT BLUES",
colors:[
"#556F97","#7FA5C7","#467CA8",
"#5C8FBD","#6E93B2","#8FA8C3",
"#4E6B8F","#88A6C0"
]
},

{
title:"SOFT TEALS",
colors:[
"#356563",
"#4C7A6D",
"#5F8F91",
"#7FAEA3",
"#2F6A5F",
"#5B9C90"
]
},

{
title:"SOFT SAGE GREENS",
colors:[
"#A7B59E",
"#8FA08B",
"#7E917E",
"#6F8676"
]
},

{
title:"MAUVES & PURPLES",
colors:[
"#6F5B6E","#575775","#67678A",
"#7878A0","#8A8FB1","#A87895",
"#B2749E","#5F5164","#6E668C"
]
},

{
title:"ROSES & PINKS",
colors:[
"#754C62","#9C5569","#B0717F",
"#C28792","#D497A1","#E0AEB4",
"#C04863","#E08D94","#D89198"
]
},

{
title:"SOFT SUMMER YELLOWS",
colors:[
"#D8D1A8",
"#CFC89E",
"#E2DBB4",
"#C7C19A"
]
}

];

const grid=document.getElementById("grid")
const lightbox=document.getElementById("lightbox")
const lightboxColor=document.getElementById("lightboxColor")

let all=[]
let index=0
let startX=0

groups.forEach(group=>{

const title=document.createElement("div")
title.className="section-title"
title.textContent=group.title
grid.appendChild(title)

group.colors.forEach(color=>{

all.push(color)

const tile=document.createElement("div")
tile.className="tile"
tile.style.background=color

tile.onclick=()=>{
index=all.indexOf(color)
open()
}

grid.appendChild(tile)

})

})

function open(){
lightbox.classList.add("show")
render()
}

function render(){
lightboxColor.style.background=all[index]
}

function next(){
index=(index+1)%all.length
render()
}

function prev(){
index=(index-1+all.length)%all.length
render()
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show")
document.getElementById("next").onclick=next
document.getElementById("prev").onclick=prev

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX
if(Math.abs(diff)<40)return
diff<0?next():prev()
})

</script>

</body>
</html>
